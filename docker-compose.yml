version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smartticket_server
    ports:
      - "5001:5001"
    env_file:
      - ./server/.env
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: smartticket_client
    ports:
      - "5173:5173"
      - "5174:5174"
    depends_on:
      - server
    restart: unless-stopped
