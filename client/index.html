<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ticket</title>
    <!-- Inline script: runs BEFORE React, prevents dark canvas on /widget route -->
    <script>
      // Force transparency immediately for widget routes
      if (window.location.pathname.includes('widget') || window.location.search.includes('isEmbedded=true')) {
        document.documentElement.style.background = 'transparent';
        document.documentElement.style.backgroundColor = 'transparent';
        var s = document.createElement('style');
        s.textContent = 'html, body, #root { background: transparent !important; background-color: transparent !important; }';
        document.head.appendChild(s);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
